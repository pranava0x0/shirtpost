name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only token by default (CLAUDE.md supply-chain hardening).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest (Python 3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      # Actions pinned to full commit SHAs (not moving tags) per CLAUDE.md.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Create venv
        run: uv venv
      - name: Install dependencies (hash-locked)
        # --require-hashes rejects any package whose hash doesn't match the lock,
        # closing the same-version-republish window. Regenerate the lock with:
        #   uv pip compile requirements-dev.txt --universal --generate-hashes -o requirements-dev.lock
        run: uv pip install --require-hashes -r requirements-dev.lock
      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend — typecheck + build (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (locked)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
